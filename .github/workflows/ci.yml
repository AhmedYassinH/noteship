name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm lint
      - name: Build
        run: pnpm build
      # - name: Test
      #   run: pnpm test

  deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    # environment: dev
    permissions:
      id-token: write
      contents: read
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AUTH0_ISSUER_BASE_URL: ${{ secrets.AUTH0_ISSUER_BASE_URL }}
      AUTH0_AUDIENCE: ${{ secrets.AUTH0_AUDIENCE }}
      NOTESHIP_CONTENT_DOMAIN: ${{ secrets.NOTESHIP_CONTENT_DOMAIN }}
      NOTESHIP_CONTENT_CUSTOM_DOMAIN: ${{ secrets.NOTESHIP_CONTENT_CUSTOM_DOMAIN }}
      NOTESHIP_CONTENT_CERTIFICATE_ARN: ${{ secrets.NOTESHIP_CONTENT_CERTIFICATE_ARN }}
      NOTESHIP_CONTENT_UPLOAD_ORIGIN: ${{ secrets.NOTESHIP_CONTENT_UPLOAD_ORIGIN }}
      NOTESHIP_CONTENT_COOKIE_DOMAIN: ${{ secrets.NOTESHIP_CONTENT_COOKIE_DOMAIN }}
      NOTESHIP_CONTENT_SESSION_TTL_SECONDS: ${{ secrets.NOTESHIP_CONTENT_SESSION_TTL_SECONDS }}
      NOTESHIP_TEMP_UPLOAD_EXPIRY_MINUTES: ${{ secrets.NOTESHIP_TEMP_UPLOAD_EXPIRY_MINUTES }}
      NOTESHIP_TEMP_UPLOAD_LIFECYCLE_DAYS: ${{ secrets.NOTESHIP_TEMP_UPLOAD_LIFECYCLE_DAYS }}
      NOTESHIP_API_CUSTOM_DOMAIN: ${{ secrets.NOTESHIP_API_CUSTOM_DOMAIN }}
      NOTESHIP_API_CERTIFICATE_ARN: ${{ secrets.NOTESHIP_API_CERTIFICATE_ARN }}
      NOTESHIP_CLOUDFRONT_KEY_PAIR_ID: ${{ secrets.NOTESHIP_CLOUDFRONT_KEY_PAIR_ID }}
      NOTESHIP_CLOUDFRONT_PRIVATE_KEY: ${{ secrets.NOTESHIP_CLOUDFRONT_PRIVATE_KEY }}
      NOTESHIP_INTEGRATION_CREDENTIALS_KEY_B64: ${{ secrets.NOTESHIP_INTEGRATION_CREDENTIALS_KEY_B64 }}
      NOTESHIP_INTEGRATION_CREDENTIALS_KEY_VERSION: ${{ secrets.NOTESHIP_INTEGRATION_CREDENTIALS_KEY_VERSION }}
      NOTESHIP_WEB_ORIGIN: ${{ secrets.NOTESHIP_WEB_ORIGIN }}
      NOTESHIP_WEB_DOMAIN: ${{ secrets.NOTESHIP_WEB_DOMAIN }}
      NOTESHIP_WEB_CERTIFICATE_ARN: ${{ secrets.NOTESHIP_WEB_CERTIFICATE_ARN }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_EMBED_MODEL: ${{ secrets.OPENAI_EMBED_MODEL }}
      OPENAI_DRAFT_MODEL: ${{ secrets.OPENAI_DRAFT_MODEL }}
      QDRANT_URL: ${{ secrets.QDRANT_URL }}
      QDRANT_COLLECTION: ${{ secrets.QDRANT_COLLECTION }}
      QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
      NOTESHIP_BILLING_ENABLED: ${{ secrets.NOTESHIP_BILLING_ENABLED }}
      STRIPE_PRICE_PRO_MONTHLY: ${{ secrets.STRIPE_PRICE_PRO_MONTHLY }}
      STRIPE_PRICE_PRO_YEARLY: ${{ secrets.STRIPE_PRICE_PRO_YEARLY }}
      LINKEDIN_CLIENT_ID: ${{ secrets.LINKEDIN_CLIENT_ID }}
      LINKEDIN_CLIENT_SECRET: ${{ secrets.LINKEDIN_CLIENT_SECRET }}
      LINKEDIN_API_VERSION: ${{ secrets.LINKEDIN_API_VERSION }}
      LINKEDIN_TEXT_MAX_CHARS: ${{ secrets.LINKEDIN_TEXT_MAX_CHARS }}
      LINKEDIN_COMMENT_MAX_CHARS: ${{ secrets.LINKEDIN_COMMENT_MAX_CHARS }}
      LINKEDIN_MAX_IMAGES_PER_POST: ${{ secrets.LINKEDIN_MAX_IMAGES_PER_POST }}
      NOTESHIP_LLM_PROVIDER: ${{ secrets.NOTESHIP_LLM_PROVIDER }}
      NOTESHIP_EMBEDDING_ENABLED: ${{ secrets.NOTESHIP_EMBEDDING_ENABLED }}
      NOTESHIP_VECTOR_DB_PROVIDER: ${{ secrets.NOTESHIP_VECTOR_DB_PROVIDER }}
      NOTESHIP_GUARDRAILS_BUDGET_LIMIT_USD: ${{ secrets.NOTESHIP_GUARDRAILS_BUDGET_LIMIT_USD }}
      NOTESHIP_GUARDRAILS_BILLING_ALARM_USD: ${{ secrets.NOTESHIP_GUARDRAILS_BILLING_ALARM_USD }}
      NOTESHIP_GUARDRAILS_EMAILS: ${{ secrets.NOTESHIP_GUARDRAILS_EMAILS }}
      NOTESHIP_HTTP_API_ID: ${{ secrets.NOTESHIP_HTTP_API_ID }}
      NEXT_PUBLIC_AUTH0_DOMAIN: ${{ secrets.NEXT_PUBLIC_AUTH0_DOMAIN }}
      NEXT_PUBLIC_AUTH0_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_AUTH0_CLIENT_ID }}
      NEXT_PUBLIC_AUTH0_AUDIENCE: ${{ secrets.NEXT_PUBLIC_AUTH0_AUDIENCE }}
      NEXT_PUBLIC_AUTH0_REDIRECT_URI: ${{ secrets.NEXT_PUBLIC_AUTH0_REDIRECT_URI }}
      NEXT_PUBLIC_AUTH0_LOGOUT_REDIRECT_URI: ${{ secrets.NEXT_PUBLIC_AUTH0_LOGOUT_REDIRECT_URI }}
      NEXT_PUBLIC_API_BASE_URL: ${{ secrets.NEXT_PUBLIC_API_BASE_URL }}
      NEXT_PUBLIC_ENV: ${{ secrets.NEXT_PUBLIC_ENV }}
      NEXT_PUBLIC_CONTENT_DOMAIN: ${{ secrets.NEXT_PUBLIC_CONTENT_DOMAIN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.12.0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Deploy API stack
        run: pnpm --filter @noteship/infra cdk deploy NoteshipApi-dev -c env=dev -c region=$AWS_REGION --require-approval never
      - name: Deploy workers stack
        run: pnpm --filter @noteship/infra cdk deploy NoteshipWorkers-dev -c env=dev -c region=$AWS_REGION --require-approval never
      # - name: Deploy web stack
      #   run: pnpm dlx aws-cdk@2.151.0 deploy NoteshipWeb-dev -c env=dev -c region=$AWS_REGION --require-approval never
      #   working-directory: packages/infra
      - name: Build web
        run: pnpm --filter @noteship/web build

      - name: Publish web assets
        run: pnpm --filter @noteship/web deploy:assets:dev
